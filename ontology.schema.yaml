$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/pentaxis93/principles/ontology.schema.yaml"
title: Principles corpus ontology
type: object
additionalProperties: false
required:
  - schema_version
  - relation_types
  - folds
  - nodes
  - topology
  - relations
properties:
  schema_version:
    const: 1
  relation_types:
    type: array
    minItems: 7
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - meaning
        - placement
        - directionality
        - reciprocity
        - rendering
      properties:
        name:
          enum:
            - projection
            - corollary
            - composition
            - dual
            - isomorphism
            - enables
            - kin
        meaning:
          type: string
          minLength: 1
        placement:
          enum:
            - in-document
            - Relations
        directionality:
          type: string
          minLength: 1
        reciprocity:
          type: string
          minLength: 1
        rendering:
          type: string
          minLength: 1
        annotations:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - label
              - meaning
            properties:
              label:
                type: string
                minLength: 1
              meaning:
                type: string
                minLength: 1
  folds:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - label
        - canonical_type
        - disposition
      properties:
        label:
          type: string
          minLength: 1
        canonical_type:
          enum:
            - projection
            - corollary
            - composition
            - dual
            - isomorphism
            - enables
            - kin
        annotation:
          type: string
          minLength: 1
        disposition:
          type: string
          minLength: 1
  nodes:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - kind
        - path
      properties:
        id:
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        title:
          type: string
          minLength: 1
        kind:
          enum:
            - principle
            - composition
        path:
          type: string
          pattern: "^(principles|compositions)/[a-z0-9-]+\\.md$"
  topology:
    type: object
    additionalProperties: false
    required:
      - movements
    properties:
      movements:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required:
            - id
            - label
            - question
            - principles
          properties:
            id:
              type: string
              pattern: "^[ivx]+-[a-z0-9-]+$"
            label:
              type: string
              minLength: 1
            question:
              type: string
              minLength: 1
            principles:
              type: array
              minItems: 1
              items:
                type: string
  relations:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - source
        - type
        - label
        - targets
      properties:
        source:
          type: string
        type:
          enum:
            - composition
            - dual
            - isomorphism
            - enables
            - kin
        label:
          enum:
            - composition
            - composed-of
            - dual
            - dual (tension)
            - isomorphism
            - enables
            - enabled-by
            - kin
        annotation:
          enum:
            - tension
        name:
          type: string
          minLength: 1
        targets:
          type: array
          minItems: 1
          items:
            type: string
      allOf:
        - if:
            required:
              - annotation
            properties:
              annotation:
                const: tension
          then:
            properties:
              type:
                const: dual
              label:
                const: dual (tension)
        - if:
            properties:
              label:
                const: dual (tension)
          then:
            required:
              - annotation
            properties:
              type:
                const: dual
              annotation:
                const: tension
