schema_version: 1

relation_types:
  - name: projection
    meaning: A universal instantiated in a domain form.
    placement: in-document
    directionality: "directional: universal -> domain form"
    reciprocity: none; intra-document
    rendering: listed under **Projections**, each projection naming its source register item
  - name: corollary
    meaning: A same-level consequence derivable from a universal.
    placement: in-document
    directionality: "directional: universal -> consequence"
    reciprocity: none; intra-document
    rendering: stated under **Corollaries** as a named same-level consequence
  - name: composition
    meaning: Two or more universals acting together as one discipline.
    placement: Relations
    directionality: symmetric among constituents
    reciprocity: "reciprocal: every constituent carries the edge"
    rendering: "`<Name> : <this document's face>`, with the name linked iff a `compositions/` document exists"
  - name: dual
    meaning: One invariant seen from two aspects.
    placement: Relations
    directionality: symmetric
    reciprocity: "reciprocal: both endpoints carry it"
    rendering: "`dual` - or `dual (tension)` - `[Other](...)`: the one invariant seen as two aspects"
    annotations:
      - label: tension
        meaning: The two aspects bound an axis from opposite sides.
  - name: isomorphism
    meaning: The same move recurring in different domains. Its endpoints are named moves — a projection or a corollary — not the invariants that host them.
    placement: Relations
    directionality: symmetric
    reciprocity: "reciprocal: both endpoints carry it"
    rendering: "`isomorphism` - `[Other](...)`: the shared move, named in each domain"
  - name: enables
    meaning: One principle is the precondition of another's existence or sound operation.
    placement: Relations
    directionality: "directional: A enables B"
    reciprocity: "reciprocal: target B carries `enabled-by` back to A"
    rendering: "on A: `enables` - `[B](...)`: B's precondition; on B: `enabled-by` - `[A](...)`"
  - name: kin
    meaning: Distinct invariants share a family resemblance, or make the same demand at two sites, without one deriving from the other. Its endpoints are the invariants themselves.
    placement: Relations
    directionality: symmetric
    reciprocity: "reciprocal: both endpoints carry it"
    rendering: "`kin` - `[Other](...)`: the shared demand or family resemblance"

folds:
  - label: enabled-by
    canonical_type: enables
    disposition: reciprocal rendering of `enables`
  - label: dual (tension)
    canonical_type: dual
    annotation: tension
    disposition: annotation on `dual` derived at A3 (Derivation register, Parsimony ↔ Evolvability row) — the two aspects bound an axis from opposite sides
  - label: composed-of
    canonical_type: composition
    disposition: folded into `composition` as the composition-document-side rendering of its constituents

