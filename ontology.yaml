topology:
  movements:
    - id: i-ground
      label: I - Ground
      question: What is true, and who owns what?
      principles:
        - grounding
        - traceability
        - sovereignty
        - sequence
    - id: ii-shape
      label: II - Shape
      question: Is the answer earned, single, stated as itself, and durable?
      principles:
        - parsimony
        - single-home
        - positive-form
        - evolvability
    - id: iii-protect
      label: III - Protect
      question: Does the system tell the truth and repair itself?
      principles:
        - honest-signal
        - source-repair
        - obligation-to-dissent
        - recursive-improvement
    - id: iv-land
      label: IV - Land
      question: Can the recipient act, and is completion a fact?
      principles:
        - transmission
        - verifiable-completion

